packages:
  - "apps/*"
  - "packages/*"
overrides:
  # GHSA-qx2v-qp2m-jg93 : next@16.2.10 pin postcss@8.4.31 (XSS via </style>
  # non échappé). Forcé au-delà de la version patchée en attendant que next
  # bump sa dépendance transitive.
  postcss: ">=8.5.10"
allowBuilds:
  esbuild: true
  sharp: false
  unrs-resolver: false
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.3'
  - '@turbo/darwin-arm64@2.10.3'
  - '@turbo/linux-64@2.10.3'
  - '@turbo/linux-arm64@2.10.3'
  - '@turbo/windows-64@2.10.3'
  - '@turbo/windows-arm64@2.10.3'
  - turbo@2.10.3
